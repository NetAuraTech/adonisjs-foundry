# docker-compose.yml
version: '3.8'

services:
  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  app:
    build: .
    deploy:
      replicas: 3
    environment:
      - NODE_ENV=production
      - PORT=3333
      - HOST=0.0.0.0
      - LOG_LEVEL=info
      - APP_KEY=mLkmXGcKT_BHO7EX3HAuOU0iT6eixPXU
      - SESSION_DRIVER=cookie
      - REDIS_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_DATABASE=app
      - SMTP_HOST=localhost
      - SMTP_PORT=1025
      - SMTP_USERNAME=username
      - SMTP_PASSWORD=password
      - SMTP_FROM_ADDRESS=contact@example.com
    depends_on:
      - redis
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data

  typesense:
    image: typesense/typesense:30.1
    environment:
      - TYPESENSE_DATA_DIR=/data
      - TYPESENSE_API_KEY=xyz123
    volumes:
      - typesensedata:/data

volumes:
  pgdata:
  redisdata:
  typesensedata:
